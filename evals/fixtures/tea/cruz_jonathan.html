        function setCookie(name, value) {
            var exdate = new Date();
            exdate.setDate(exdate.getDate() + 999);
            var c_value = escape(value) + "; expires=" + exdate.toUTCString() + "; path=/";
            document.cookie = name + "=" + c_value;
        }

        function set_cookie(c_name, value, exdays) {
            var exdate = new Date();
            exdate.setDate(exdate.getDate() + exdays);
            var c_value = escape(value) + ((exdays == null) ? "" : "; expires=" + exdate.toUTCString());
            document.cookie = c_name + "=" + c_value;
        }

        function newExternalSystemWindow(externalSystemName, url) {
            var window_name = externalSystemName + "Window";
            var cookie_name = window_name + "Open";
            set_cookie(cookie_name, "1", 1);
            var ExternalSystemWindow = window.open(url, window_name, "toolbar=yes,location=yes,menubar=yes,scrollbars=yes,resizable=yes");
